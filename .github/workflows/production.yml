on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - stable/*

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-lint:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [24]

    defaults:
      run:
        working-directory: /nuxt-authentication

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true
          cache_dependency_path: |
            /pnpm-lock.yaml

      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          # cache: pnpm
          # cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: |
          pnpm run lint
          pnpm run lint:eslint
        continue-on-error: true # Allow linting errors to not fail the build for now

      - name: Build
        run: pnpm run prepack
